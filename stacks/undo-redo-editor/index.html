<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Undo Redo Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <!-- LEFT: Editor -->
  <div class="editor-section">
    <h2>Text Editor</h2>
    <textarea id="editor" placeholder="Start typing..."></textarea>

    <div class="buttons">
      <button type="button" onclick="undo()">Undo</button>
      <button type="button" onclick="redo()">Redo</button>
    </div>
  </div>

  <!-- RIGHT: Stack Visualization -->
  <div class="stack-section">
    <h2>Stack Operations</h2>

    <p><strong>Current Operation:</strong> <span id="operation">None</span></p>
    <p><strong>Previous State:</strong> <span id="prevState">""</span></p>

    <div class="stack-box">
      <h3>Undo Stack</h3>
      <ul id="undoStackList"></ul>
    </div>

    <div class="stack-box">
      <h3>Redo Stack</h3>
      <ul id="redoStackList"></ul>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
